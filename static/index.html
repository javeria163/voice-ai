<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 2.5rem;
      color: #58a6ff;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #8b949e;
      margin-bottom: 60px;
      font-size: 1rem;
    }

    .orb {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, #1f6feb, #0d1117);
      border: 2px solid #1f6feb;
      margin: 0 auto 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(31, 111, 235, 0.3);
    }

    .orb:hover {
      box-shadow: 0 0 60px rgba(31, 111, 235, 0.6);
      transform: scale(1.05);
    }

    .orb.listening {
      background: radial-gradient(circle, #238636, #0d1117);
      border-color: #3fb950;
      box-shadow: 0 0 60px rgba(63, 185, 80, 0.6);
      animation: pulse 1s infinite;
    }

    .orb.speaking {
      background: radial-gradient(circle, #9933ff, #0d1117);
      border-color: #9933ff;
      box-shadow: 0 0 60px rgba(153, 51, 255, 0.6);
      animation: pulse 0.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .orb-icon {
      font-size: 4rem;
    }

    .status {
      font-size: 1.2rem;
      color: #8b949e;
      margin-bottom: 20px;
      height: 30px;
    }

    .status.listening { color: #3fb950; }
    .status.speaking { color: #9933ff; }

    .transcript {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      margin: 20px auto;
      max-width: 500px;
      min-height: 80px;
      text-align: left;
    }

    .transcript .label {
      font-size: 0.75rem;
      color: #8b949e;
      margin-bottom: 8px;
    }

    .transcript .text {
      color: #e6edf3;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      margin: 5px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #30363d;
    }

    .conversation {
      max-width: 500px;
      margin: 20px auto;
      text-align: left;
    }

    .message {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 10px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .message.user {
      background: #1f6feb22;
      border: 1px solid #1f6feb44;
      color: #79c0ff;
    }

    .message.ai {
      background: #23863622;
      border: 1px solid #23863644;
      color: #56d364;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Voice AI</h1>
    <p class="subtitle">Click the orb and speak — AI responds instantly</p>

    <div class="orb" id="orb" onclick="toggleListening()">
      <span class="orb-icon" id="orbIcon">🎤</span>
    </div>

    <div class="status" id="status">Click orb to start talking</div>

    <div class="transcript">
      <div class="label">YOU SAID</div>
      <div class="text" id="userText">...</div>
    </div>

    <div class="transcript">
      <div class="label">AI RESPONSE</div>
      <div class="text" id="aiText">...</div>
    </div>

    <button class="btn" onclick="clearConversation()">🗑️ Clear</button>

    <div class="conversation" id="conversation"></div>
  </div>

  <script>
    let recognition;
    let isListening = false;

    // Setup speech recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';

      recognition.onresult = async (event) => {
        const text = event.results[0][0].transcript;
        document.getElementById('userText').textContent = text;
        addMessage('user', text);
        await getAIResponse(text);
      };

      recognition.onend = () => {
        if (isListening) stopListening();
      };

      recognition.onerror = (e) => {
        setStatus('Error: ' + e.error, '');
        stopListening();
      };
    } else {
      alert('Sorry, your browser does not support speech recognition. Please use Chrome!');
    }

    function toggleListening() {
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    }

    function startListening() {
      isListening = true;
      recognition.start();
      document.getElementById('orb').className = 'orb listening';
      document.getElementById('orbIcon').textContent = '👂';
      setStatus('Listening...', 'listening');
    }

    function stopListening() {
      isListening = false;
      recognition.stop();
      document.getElementById('orb').className = 'orb';
      document.getElementById('orbIcon').textContent = '🎤';
      setStatus('Processing...', '');
    }

    async function getAIResponse(text) {
      try {
        const formData = new FormData();
        formData.append('SpeechResult', text);

        const response = await fetch('/process-speech', {
          method: 'POST',
          body: formData
        });

        const xmlText = await response.text();
        
        // Extract the Say text from XML
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, 'text/xml');
        const sayEl = xml.querySelector('Say');
        const playEl = xml.querySelector('Play');

        if (sayEl) {
          const aiText = sayEl.textContent;
          document.getElementById('aiText').textContent = aiText;
          addMessage('ai', aiText);
          speakText(aiText);
        } else if (playEl) {
          // Play ElevenLabs audio
          const audioUrl = playEl.textContent;
          document.getElementById('aiText').textContent = '🔊 Playing AI voice...';
          playAudio(audioUrl);
        }

      } catch (err) {
        setStatus('Error connecting to AI', '');
        console.error(err);
      }
    }

    function speakText(text) {
      document.getElementById('orb').className = 'orb speaking';
      document.getElementById('orbIcon').textContent = '🔊';
      setStatus('AI is speaking...', 'speaking');

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 1.0;
      utterance.pitch = 1.0;

      utterance.onend = () => {
        document.getElementById('orb').className = 'orb';
        document.getElementById('orbIcon').textContent = '🎤';
        setStatus('Click orb to speak again', '');
      };

      window.speechSynthesis.speak(utterance);
    }

    async function playAudio(url) {
      document.getElementById('orb').className = 'orb speaking';
      document.getElementById('orbIcon').textContent = '🔊';
      setStatus('AI is speaking...', 'speaking');

      const audio = new Audio(url);
      audio.onended = () => {
        document.getElementById('orb').className = 'orb';
        document.getElementById('orbIcon').textContent = '🎤';
        setStatus('Click orb to speak again', '');
      };
      await audio.play();
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = (role === 'user' ? '👤 ' : '🤖 ') + text;
      document.getElementById('conversation').appendChild(div);
    }

    function setStatus(text, className) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = 'status ' + className;
    }

    function clearConversation() {
      document.getElementById('conversation').innerHTML = '';
      document.getElementById('userText').textContent = '...';
      document.getElementById('aiText').textContent = '...';
      fetch('/clear', { method: 'POST' });
    }
  </script>
</body>
</html>
